name: Test Harbor Access

on:
  push:                # push 시 자동 실행
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check network access to Harbor
        run: |
          echo "=== DNS 확인 ==="
          nslookup harbor.cu.ac.kr || echo "DNS 실패"
          
          echo "=== 포트 접근 확인 ==="
          curl -v --connect-timeout 10 https://harbor.cu.ac.kr/api/v2.0/ping || echo "HTTP 접근 실패"

      - name: Try Docker login
        run: |
          echo "=== Docker Login 시도 ==="
          echo "${{ secrets.HARBOR_PASSWORD }}" | docker login harbor.cu.ac.kr -u "${{ secrets.HARBOR_USERNAME }}" --password-stdin
