apiVersion: apps/v1
kind: Deployment
metadata:
  name: compute-general
spec:
  replicas: 3
  selector:
    matchLabels:
      app: warm-pod-pool
      compute-type: general
      pool-status: available
  template:
    metadata:
      labels:
        app: warm-pod-pool
        compute-type: general
        pool-status: available
        assigned-user: ""
    spec:
      containers:
      - name: compute-agent
        image: harbor.cu.ac.kr/k8s_dynamic_allocator/compute_pod:latest
        imagePullPolicy: Always
        args: ["python3", "agent.py", "--config-file", "kda_config.py"]
        ports:
        - containerPort: 8080
          name: agent
        readinessProbe:
          httpGet:
            path: /ready
            port: agent
          initialDelaySeconds: 1
          periodSeconds: 2
          timeoutSeconds: 1
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        securityContext:
          privileged: true
        volumeMounts:
        - name: ssh-private-key
          mountPath: /etc/ssh-key
          readOnly: true
      volumes:
      - name: ssh-private-key
        secret:
          secretName: compute-ssh-key
          defaultMode: 384
