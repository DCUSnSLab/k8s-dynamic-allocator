apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: swlabpods
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush                5
        Daemon               Off
        Log_Level            info
        Parsers_File         parsers.conf
        HTTP_Server          On
        HTTP_Listen          0.0.0.0
        HTTP_Port            2020
        storage.path         /buffers/fluent-bit/
        storage.sync         normal
        storage.backlog.mem_limit 50M

    [INPUT]
        Name                 tail
        Tag                  kube.*
        Path                 /var/log/containers/*_swlabpods_*.log
        Path_Key             filename
        Parser               cri
        DB                   /buffers/fluent-bit/tail.db
        Mem_Buf_Limit        50MB
        Skip_Long_Lines      On
        Refresh_Interval     5
        storage.type         filesystem

    [FILTER]
        Name                 kubernetes
        Match                kube.*
        Kube_Tag_Prefix      kube.var.log.containers.
        Kube_URL             https://kubernetes.default.svc:443
        Kube_CA_File         /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File      /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log            On
        Merge_Log_Key        app_log
        K8S-Logging.Parser   On
        K8S-Logging.Exclude  On
        Labels               On
        Annotations          Off

    # Keep this project's namespace only.
    [FILTER]
        Name                 grep
        Match                kube.*
        Regex                $kubernetes['namespace_name'] ^swlabpods$

    # Keep only allocator control-plane components. User pods, smoke checks,
    # log-reader pods, Redis, and Fluent Bit itself are intentionally excluded.
    [FILTER]
        Name                 grep
        Match                kube.*
        Regex                $kubernetes['labels']['app'] ^(controller|backend-pool|swlabssh)$

    [OUTPUT]
        Name                 file
        Match                kube.*
        Path                 /mnt/logs
        File                 ${NODE_NAME}.jsonl
        Format               plain
        Mkdir                true

  parsers.conf: |
    [PARSER]
        Name         cri
        Format       regex
        Regex        ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key     time
        Time_Format  %Y-%m-%dT%H:%M:%S.%L%z
