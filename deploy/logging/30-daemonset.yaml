apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: swlabpods
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      tolerations:
      - operator: Exists
        effect: NoSchedule
      - operator: Exists
        effect: NoExecute
      terminationGracePeriodSeconds: 10
      containers:
      - name: fluent-bit
        image: fluent/fluent-bit:3.1.9
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 2020
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        resources:
          requests:
            cpu: "50m"
            memory: "100Mi"
          limits:
            cpu: "300m"
            memory: "300Mi"
        volumeMounts:
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: config
          mountPath: /fluent-bit/etc/
        - name: flb-storage
          mountPath: /buffers/fluent-bit
        - name: logs-pvc
          mountPath: /mnt/logs
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: config
        configMap:
          name: fluent-bit-config
      - name: flb-storage
        hostPath:
          path: /var/log/fluent-bit-storage
          type: DirectoryOrCreate
      - name: logs-pvc
        persistentVolumeClaim:
          claimName: logs-pvc
