apiVersion: v1
kind: ServiceAccount
metadata:
  name: swlabssh
  namespace: swlabpods
  labels:
    app: swlabssh
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: swlabssh-role
  namespace: swlabpods
  labels:
    app: swlabssh
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/exec
      - pods/portforward
      - persistentvolumeclaims
    verbs:
      - get
      - watch
      - list
      - create
      - delete
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: swlabssh-rolebinding
  namespace: swlabpods
  labels:
    app: swlabssh
subjects:
  - kind: ServiceAccount
    name: swlabssh
    namespace: swlabpods
roleRef:
  kind: Role
  name: swlabssh-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: swlabssh
  namespace: swlabpods
  labels:
    app: swlabssh
spec:
  replicas: 1
  selector:
    matchLabels:
      kubessh: swlabssh
  template:
    metadata:
      labels:
        app: swlabssh
        kubessh: swlabssh
    spec:
      serviceAccountName: swlabssh
      containers:
        - name: swlabssh
          image: harbor.cu.ac.kr/k8s_dynamic_allocator/swlabssh:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args: ["python3 ./kubessh/app.py --KubeSSH.config_file=kubessh_dummy_config.py"]
          tty: true
          stdin: true
          env:
            - name: KUBESSH_DEFAULT_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: ssh
              containerPort: 8022
              protocol: TCP
          securityContext:
            privileged: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "500Mi"
              cpu: "600m"
---
apiVersion: v1
kind: Service
metadata:
  name: swlabssh
  namespace: swlabpods
  labels:
    app: swlabssh
spec:
  type: NodePort
  selector:
    kubessh: swlabssh
  ports:
    - name: ssh
      port: 32000
      targetPort: ssh
      protocol: TCP
      nodePort: 30622
